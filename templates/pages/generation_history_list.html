{% extends "layout/base.html" %}
{% block title %}历史记录{% endblock %}

{% block content %}
  <div class="breadcrumb">
    <a href="{{ url_for('web.assistant_generate') }}">报告生成</a>
    <span class="breadcrumb-sep">/</span>
    <span>历史记录</span>
  </div>

  <div class="card hero assistant-intro">
    <div class="section-head" style="margin-bottom: 0; align-items: center;">
      <h1 style="margin: 0;">历史记录</h1>
    </div>
    <p class="muted" style="margin: 12px 0 0; font-size: 13px;">报告生成成功后写入数据库，并在 <code>uploads/filled_exports</code> 保留一份回填成品；默认仅保留最近 3 天，超时由服务自动清理记录与成品文件。再次下载仍依赖模板 <code>uploads/&lt;task_id&gt;.pptx</code>。</p>
  </div>

  <div class="card" id="gh-list-wrap">
    <div class="presentation-list-toolbar" style="margin-top: 0; margin-bottom: 10px;">
      <label class="presentation-list-search-label" for="gh-search-input">搜索</label>
      <input
        id="gh-search-input"
        class="presentation-list-search-input"
        type="search"
        placeholder="按主题或模板任务检索历史记录"
        autocomplete="off"
      />
      <button type="button" class="button secondary" id="gh-search-btn">查询</button>
      <span class="muted" style="font-size: 12px;">手动清理：</span>
      <select id="gh-cleanup-days" class="select-inline" style="width: auto; min-width: 140px;">
        <option value="3">保留近 3 天</option>
        <option value="7">保留近 7 天</option>
        <option value="15">保留近 15 天</option>
      </select>
      <button type="button" class="button secondary" id="gh-cleanup-btn">执行清理</button>
    </div>
    <div id="gh-list-mount" class="table-scroll"></div>
  </div>
{% endblock %}

{% block scripts %}
  <script src="{{ url_for('static', filename='js/app/generation-history-store.js') }}"></script>
  <script src="{{ url_for('static', filename='js/app/generation-history-list.js') }}"></script>
{% endblock %}
