{% extends "layout/base.html" %}
{% block title %}数据管理{% endblock %}

{% block content %}
  <div class="breadcrumb">
    <a href="{{ url_for('web.overview') }}">概览</a>
    <span class="breadcrumb-sep">/</span>
    <span>数据管理</span>
  </div>

  <div class="card hero assistant-intro">
    <div class="section-head" style="margin-bottom: 0; align-items: center;">
      <h1 style="margin: 0;">数据管理</h1>
      <a class="button" href="{{ url_for('web.student_data_new') }}">新建数据</a>
    </div>
  </div>

  <div class="card">
    <div class="sd-toolbar">
      <input
        type="search"
        id="sd-search-input"
        class="ct-input sd-search-input"
        placeholder="搜索…"
        autocomplete="off"
      />
      <button type="button" class="button secondary" id="sd-search-btn">查询</button>
      <button type="button" class="button secondary" id="sd-refresh-btn">重置</button>
      <div class="sd-toolbar-actions">
        <label class="sd-bulk-label">
          <span class="button secondary" style="cursor: pointer; display: inline-block;">智能导入</span>
          <input
            type="file"
            id="sd-import-ai-file"
            accept=".csv,.xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,text/csv"
            hidden
          />
        </label>
      </div>
    </div>
    <p class="muted" style="margin: 12px 0 0; font-size: 13px;">
      上传任意表头的 UTF-8 CSV 或 Excel（.xlsx）即可；服务端按批调用大模型将列与行映射到学生档案字段，文件中没有的字段会留空。每批处理 10
      条以降低超时与丢字段风险，行数较多时请耐心等待。
    </p>
    <div id="sd-bulk-message" hidden></div>
    <div id="sd-list-mount" class="table-scroll" style="margin-top: 16px;"></div>
  </div>
{% endblock %}

{% block scripts %}
  <script src="{{ url_for('static', filename='js/app/student-data-store.js') }}"></script>
  <script src="{{ url_for('static', filename='js/app/student-data-list.js') }}"></script>
{% endblock %}
