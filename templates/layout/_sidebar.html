{# 主导航：扁平菜单 #}
<aside class="app-sidebar" aria-label="主导航">
  <div class="app-sidebar-brand">
    <div class="app-sidebar-brand-mark" aria-hidden="true">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="6" width="24" height="20" rx="3" stroke="currentColor" stroke-width="1.75" opacity="0.9" />
        <path d="M4 12h24" stroke="currentColor" stroke-width="1.75" opacity="0.5" />
        <circle cx="11" cy="9" r="1.25" fill="currentColor" opacity="0.85" />
        <circle cx="15.5" cy="9" r="1.25" fill="currentColor" opacity="0.55" />
        <path d="M9 17h8M9 21h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.45" />
      </svg>
    </div>
    <div class="app-sidebar-brand-text">
      <strong>报告生成平台</strong>
      <span>PPT Auto Generator</span>
    </div>
  </div>
  <nav class="app-nav" aria-label="页面导航">
    <p class="app-nav-kicker">菜单</p>
    <a
      class="app-nav-link{% if request.endpoint == 'web.overview' %} is-active{% endif %}"
      href="{{ url_for('web.overview') }}"
    >
      <span class="app-nav-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="9" rx="1" />
          <rect x="14" y="3" width="7" height="5" rx="1" />
          <rect x="14" y="12" width="7" height="9" rx="1" />
          <rect x="3" y="16" width="7" height="5" rx="1" />
        </svg>
      </span>
      <span class="app-nav-label">概览</span>
    </a>
    <a
      class="app-nav-link{% if request.endpoint == 'web.assistant_generate' %} is-active{% endif %}"
      href="{{ url_for('web.assistant_generate') }}"
    >
      <span class="app-nav-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
          <path d="M14 2v6h6M16 13H8M16 17H8M10 9H8" />
        </svg>
      </span>
      <span class="app-nav-label">报告生成</span>
    </a>
    <a
      class="app-nav-link{% if request.endpoint in ('web.assistant_upload', 'web.presentation_detail') %} is-active{% endif %}"
      href="{{ url_for('web.assistant_upload') }}"
    >
      <span class="app-nav-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2" />
          <path d="M8 21h8M12 17v4" />
        </svg>
      </span>
      <span class="app-nav-label">文档模板管理</span>
    </a>
    <a
      class="app-nav-link{% if request.endpoint in (
        'web.student_data_list',
        'web.student_data_new',
        'web.student_data_detail',
        'web.student_data_edit',
      ) %} is-active{% endif %}"
      href="{{ url_for('web.student_data_list') }}"
    >
      <span class="app-nav-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
      </span>
      <span class="app-nav-label">学生数据管理</span>
    </a>
    <a
      class="app-nav-link{% if request.endpoint in (
        'web.chapter_templates_list',
        'web.chapter_template_new',
        'web.chapter_template_detail',
        'web.chapter_template_edit',
      ) %} is-active{% endif %}"
      href="{{ url_for('web.chapter_templates_list') }}"
    >
      <span class="app-nav-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
          <path d="M8 7h8M8 11h8M8 15h4" />
        </svg>
      </span>
      <span class="app-nav-label">报告类型管理</span>
    </a>
    <a
      class="app-nav-link{% if request.endpoint in ('web.generation_history_list', 'web.generation_history_detail') %} is-active{% endif %}"
      href="{{ url_for('web.generation_history_list') }}"
    >
      <span class="app-nav-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" />
          <path d="M12 6v6l4 2" />
        </svg>
      </span>
      <span class="app-nav-label">历史记录</span>
    </a>
  </nav>
  <div class="app-sidebar-foot">
    <span class="app-sidebar-foot-dot" aria-hidden="true"></span>
    <span>工作台导航</span>
  </div>
</aside>
